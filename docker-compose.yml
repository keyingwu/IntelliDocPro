services:
  intellidocpro:
    build: .
    image: intellidocpro
    ports:
      - "8000:8000"
    # Two ways to provide credentials, usable together; on conflict the host
    # environment variable wins:
    #   1. backend/.env file (cp backend/.env.example backend/.env, then fill in keys)
    #   2. host environment variables (export OPENAI_API_KEY=... then docker compose up)
    env_file:
      - path: backend/.env
        required: false
    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - AZURE_OPENAI_ENDPOINT
      - AZURE_OPENAI_API_KEY
      - AZURE_OPENAI_DEPLOYMENT
    volumes:
      - intellidocpro-data:/data
    restart: unless-stopped

volumes:
  intellidocpro-data:
